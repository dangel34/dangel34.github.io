<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  {{ content_for_header }}

  <!-- =========================
       Privacy & Security Controls
  ========================== -->

  <!-- Prevent search engine indexing -->
  <meta name="robots" content="noindex, nofollow">

  <!-- Prevent referrer leakage -->
  <meta name="referrer" content="no-referrer">

  <!-- Prevent MIME sniffing -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <!-- Prevent clickjacking -->
  <meta http-equiv="X-Frame-Options" content="DENY">

  <!-- Strict Content Security Policy -->
  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
      img-src 'self' data:;
      font-src 'self' https://cdnjs.cloudflare.com;
      object-src 'none';
      base-uri 'self';
      frame-ancestors 'none';
      form-action https://formsubmit.co;
    ">

  <!-- =========================
       Styles
  ========================== -->

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/dark.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="{{ '/assets/js/theme-init.js' | relative_url }}"></script>

</head>

<body{% if page.url == "/" %} class="page-home"{% endif %}>

  <header class="site-header">
    <div class="wrapper">
      <div class="header-container">

        <!-- Site Title -->
        <a class="site-title" href="{{ '/' | relative_url }}">
          {{ site.title }}
        </a>

        <!-- Navigation + Toggle -->
        <div class="nav-right">
          <nav class="site-nav">
            <a href="{{ '/assets/documents/projects' | relative_url }}"{% if page.url contains 'projects' %} class="active"{% endif %}>Projects</a>
            <a href="{{ '/assets/documents/research' | relative_url }}"{% if page.url contains 'research' %} class="active"{% endif %}>Research</a>
            <a href="{{ '/assets/documents/certifications' | relative_url }}"{% if page.url contains 'certifications' %} class="active"{% endif %}>Certifications</a>
            <a href="{{ '/assets/documents/resume' | relative_url }}"{% if page.url contains 'resume' %} class="active"{% endif %}>Resume</a>
            <a href="{{ '/contact' | relative_url }}"{% if page.url contains 'contact' %} class="active"{% endif %}>Contact</a>
          </nav>

          <div class="theme-toggle">
            <i id="theme-icon" class="fas fa-moon"></i>
          </div>
        </div>

      </div>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper footer-container">
      <span>© {{ site.time | date: "%Y" }} {{ site.title }}</span>
      <nav class="footer-nav">
        <a href="https://github.com/dangel34" target="_blank" rel="noopener noreferrer">GitHub</a>
      </nav>
    </div>
  </footer>

  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>

</body>
</html>
